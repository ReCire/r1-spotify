<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NTS Radio R1 - Install QR Code</title>
  <script src="https://unpkg.com/qr-code-styling@1.6.0-rc.1/lib/qr-code-styling.js"></script>
  <style>
    body { font-family: -apple-system, sans-serif; background: #0e0e10; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    h1 { font-size: 24px; margin-bottom: 8px; }
    p { color: #999; margin-bottom: 24px; font-size: 14px; }
    #qr { margin-bottom: 24px; }
    .url { font-size: 12px; color: #FE5F00; word-break: break-all; max-width: 400px; text-align: center; }
    .instructions { margin-top: 24px; font-size: 13px; color: #aaa; max-width: 400px; text-align: center; line-height: 1.6; }
  </style>
</head>
<body>
  <h1>NTS Radio for R1</h1>
  <p>Scan this QR code with your Rabbit R1 to install</p>
  <div id="qr"></div>
  <div class="url" id="url"></div>
  <div class="instructions">
    Point your R1's camera at this QR code.<br>
    It will register the creation and you can launch it from your creations list.
  </div>
  <script>
    const creationData = {
      title: "NTS Radio",
      url: "https://r1-nts-live.vercel.app",
      description: "Live NTS Radio streaming with infinite mixtapes",
      iconUrl: "https://r1-nts-live.vercel.app/icon.png",
      themeColor: "#0e0e10"
    };

    const qrData = JSON.stringify(creationData);
    document.getElementById('url').textContent = creationData.url;

    const qr = new QRCodeStyling({
      width: 280,
      height: 280,
      type: "canvas",
      data: qrData,
      margin: 10,
      qrOptions: { typeNumber: 0, mode: "Byte", errorCorrectionLevel: "L" },
      dotsOptions: { color: "#ffffff", type: "rounded" },
      backgroundOptions: { color: "#0e0e10" },
      cornersSquareOptions: { color: "#FE5F00", type: "extra-rounded" },
      cornersDotOptions: { color: "#FE5F00", type: "dot" }
    });

    qr.append(document.getElementById('qr'));
  </script>
</body>
</html>
